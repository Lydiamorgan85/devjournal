services:
  postgres:
    image: postgres:16-alpine
    container_name: devjournal-db
    environment:
      POSTGRES_USER: devjournal
      POSTGRES_PASSWORD: devjournal123
      POSTGRES_DB: devjournal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devjournal"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: